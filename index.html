<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Law-Trust.com | Save 80-90% on Legal Documents</title>
<meta name="description" content="Compare the best online legal document services. Wills, trusts, power of attorney, and more — save thousands in attorney fees.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0a1628;
  --navy-mid: #112240;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --cream: #f7f3ec;
  --cream-dark: #ede8df;
  --text: #1a1a2e;
  --text-light: #4a5568;
  --white: #ffffff;
  --green: #2d6a4f;
  --green-light: #52b788;
  --red: #c0392b;
}
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); overflow-x: hidden; }

/* ===== NAVBAR ===== */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(10, 22, 40, 0.96);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(201, 168, 76, 0.2);
  padding: 0 2rem; height: 70px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--white); text-decoration: none; letter-spacing: -0.02em; }
.nav-logo span { color: var(--gold); }
.nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
.nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.875rem; font-weight: 500; letter-spacing: 0.02em; transition: color 0.2s; }
.nav-links a:hover { color: var(--gold); }
.nav-cta { background: var(--gold); color: var(--navy) !important; padding: 0.5rem 1.25rem; border-radius: 4px; font-weight: 600 !important; transition: background 0.2s !important; }
.nav-cta:hover { background: var(--gold-light) !important; color: var(--navy) !important; }

/* ===== HERO ===== */
.hero { min-height: 100vh; background: var(--navy); position: relative; display: flex; align-items: center; overflow: hidden; padding-top: 70px; }
.hero-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 70% 50%, rgba(201, 168, 76, 0.07) 0%, transparent 60%),
              radial-gradient(ellipse 50% 80% at 20% 80%, rgba(45, 106, 79, 0.08) 0%, transparent 50%);
}
.hero-grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
}
.hero-content {
  position: relative; z-index: 2;
  max-width: 1200px; margin: 0 auto; padding: 5rem 2rem;
  display: grid; grid-template-columns: 1fr 420px; gap: 5rem; align-items: center;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 0.5rem;
  background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.25);
  color: var(--gold); font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 0.4rem 1rem; border-radius: 100px; margin-bottom: 1.75rem;
  animation: fadeUp 0.6s ease both;
}
.hero-eyebrow::before { content: ''; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; }

/* ===== HOW IT WORKS ===== */
.how-section { background: var(--cream-dark); }
.steps-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; margin-top: 3.5rem; position: relative; }
.steps-grid::before { content: ''; position: absolute; top: 2.25rem; left: calc(12.5% + 1.75rem); right: calc(12.5% + 1.75rem); height: 2px; background: linear-gradient(90deg, var(--gold), transparent); background: repeating-linear-gradient(90deg, var(--gold) 0, var(--gold) 8px, transparent 8px, transparent 16px); opacity: 0.4; }
.step-card { text-align: center; position: relative; }
.step-num { width: 52px; height: 52px; background: var(--navy); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--gold); margin: 0 auto 1.25rem; position: relative; z-index: 1; }
.step-title { font-weight: 700; font-size: 1rem; color: var(--navy); margin-bottom: 0.5rem; }
.step-desc { font-size: 0.85rem; color: var(--text-light); line-height: 1.65; }

/* ===== CATEGORIES ===== */
.categories-section { background: var(--white); }
.cats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; margin-top: 3rem; }
.cat-card { background: var(--cream); border: 1.5px solid var(--cream-dark); border-radius: 14px; padding: 1.75rem; text-decoration: none; transition: all 0.25s; display: flex; flex-direction: column; gap: 0.75rem; }
.cat-card:hover { border-color: var(--gold); box-shadow: 0 6px 30px rgba(0,0,0,0.07); transform: translateY(-2px); }
.cat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
.cat-name { font-weight: 700; font-size: 1rem; color: var(--navy); }
.cat-count { font-size: 0.8rem; color: var(--text-light); }
.cat-arrow { margin-top: auto; color: var(--gold); font-size: 1.2rem; font-weight: 700; transition: transform 0.2s; }
.cat-card:hover .cat-arrow { transform: translateX(4px); }

/* ===== TESTIMONIALS ===== */
.testimonials-section { background: var(--cream); }
.testi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 3rem; }
.testi-card { background: var(--white); border: 1.5px solid var(--cream-dark); border-radius: 14px; padding: 1.75rem; }
.testi-stars { color: var(--gold); font-size: 0.9rem; margin-bottom: 1rem; }
.testi-quote { font-size: 0.9rem; color: var(--text-light); line-height: 1.7; margin-bottom: 1.25rem; font-style: italic; }
.testi-author { display: flex; align-items: center; gap: 0.75rem; }
.testi-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; color: var(--white); }
.testi-name { font-weight: 700; font-size: 0.875rem; color: var(--navy); }
.testi-location { font-size: 0.75rem; color: var(--text-light); }

/* ===== SAVINGS BANNER ===== */
.banner { background: linear-gradient(135deg, var(--navy), #1a3a5c); padding: 5rem 2rem; text-align: center; position: relative; overflow: hidden; }
.banner::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 50% 50%, rgba(201,168,76,0.1) 0%, transparent 60%); }
.banner-inner { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }

/* TODO: More CSS to come */

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
